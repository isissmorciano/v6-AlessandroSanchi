{% extends 'base.html' %}

{% block content %}
<h1>Categorie Disponibili</h1> 
<h1><a href="{{ url_for('main.category_create') }}">Crea categoria</a></h1>
<br><br>


{% for categories in categories %}

<article>
    <header>
        <h2><a href="{{ url_for('main.category_detail', id=categories['id']) }}">{{ categories['nome'] }}</a></h2>

    </header>
</article>
<hr>
{% endfor %}
{% endblock %}
